model: resnet

# Training
epochs: 20
batch_size: 16
optimizer: adamw
lr: 0.001
weight_decay: 0.01
dropout: 0.1
patience: 5
grad_accum_steps: 2
num_workers: 4

# Experiment
seeds: [0, 5, 10, 15, 20]
freeze_configs:
  - freeze_none
  - freeze_conv1
  - freeze_conv1_layer1
  - freeze_conv1_layer1-2
  - freeze_conv1_layer1-3
  - freeze_conv1_layer1-4

# Output
output_dir: results

# Weights & Biases
wandb_project: wildfire-freezing
